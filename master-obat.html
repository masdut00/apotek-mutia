<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Database Obat - MutiaCare</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="layout-container"></div>
    
    <div class="app-container">
        <main class="main-content">
            <h1 class="page-title">Database Master Obat 🗄️</h1>
            
            <div class="card" style="margin-bottom: 30px; background: #fffcfd; border-color: #ffb8c6;">
                <h3 style="color: #ff758c; margin-bottom: 15px; font-size: 16px;">✨ Daftarkan Obat Baru</h3>
                <form id="form-master-obat">
                    <div class="summary-cards" style="grid-template-columns: 2fr 1fr 1fr; margin-bottom: 0;">
                        <div class="form-group" style="margin-bottom: 0;">
                            <label>Nama Obat</label>
                            <input type="text" id="nama-obat-baru" required placeholder="Contoh: Paracetamol 500mg">
                        </div>
                        <div class="form-group" style="margin-bottom: 0;">
                            <label>Satuan</label>
                            <select id="satuan-obat" required>
                                <option value="Strip">Strip</option>
                                <option value="Tablet">Tablet</option>
                                <option value="Botol">Botol</option>
                                <option value="Tube">Tube</option>
                                <option value="Kapsul">Kapsul</option>
                                <option value="Box">Box</option>
                                <option value="Sachet">Sachet</option>
                                <option value="Ampul">Ampul</option>
                                <option value="Vial">Vial</option>
                                <option value="Pcs">Pcs</option>
                            </select>
                        </div>
                        <div class="form-group" style="margin-bottom: 0;">
                            <label>Batas Minimal Stok</label>
                            <input type="number" id="stok-minimal" required min="1" placeholder="Contoh: 15">
                        </div>
                    </div>
                    <br>
                    <button type="submit" class="btn" id="btn-submit">Simpan ke Database</button>
                </form>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2 style="margin-bottom: 0;">Daftar Obat Terdaftar</h2>
                <div class="search-container" style="margin-bottom: 0; width: 250px;">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="search-master" class="search-box" placeholder="Cari obat..." style="padding: 10px 15px 10px 40px;">
                </div>
            </div>
            
            <div class="table-responsive">
                <table id="table-master">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nama Obat</th>
                            <th>Satuan</th>
                            <th>Batas Minimal</th>
                            <th>Aksi</th> </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="4">Memuat database...</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    
    <script src="js/sidebar.js"></script>
    <script src="js/api.js"></script>
    <script src="js/master-obat.js"></script>
</body>
</html>
