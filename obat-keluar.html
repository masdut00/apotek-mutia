<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Obat Keluar - MutiaCare</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body>
    <div id="layout-container"></div>
    
    <div class="app-container">
        <main class="main-content">
            <h1 class="page-title">Catat Obat Keluar 💊</h1>
            
            <div class="card" style="margin-bottom: 30px; background: #f8faff; border-color: #dbeafe;">
                <h3 style="color: #3b82f6; margin-bottom: 15px; font-size: 16px;">📥 Download Matriks Pengeluaran (1-31)</h3>
                <div style="display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end;">
                    <div class="form-group" style="margin-bottom: 0; flex: 1; min-width: 150px;">
                        <label>Pilih Bulan</label>
                        <input type="month" id="filter-bulan" required style="border-color: #bfdbfe;">
                    </div>
                    <div class="form-group" style="margin-bottom: 0; flex: 1; min-width: 150px;">
                        <label>Kategori Pasien</label>
                        <select id="filter-kategori" style="border-color: #bfdbfe;">
                            <option value="Umum">Pasien Umum</option>
                            <option value="BPJS">Pasien BPJS</option>
                        </select>
                    </div>
                    <button id="btn-download-matriks" class="btn" style="flex: 1; background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); min-width: 150px;">Download Excel</button>
                </div>
            </div>

            <div class="card" style="margin-bottom: 30px;">
                <form id="form-obat-keluar">
                    <div class="summary-cards" style="grid-template-columns: 1fr 1fr; margin-bottom: 15px;">
                        <div class="form-group" style="margin-bottom: 0;">
                            <label>Tanggal</label>
                            <input type="date" id="tanggal" required>
                        </div>
                        <div class="form-group" style="margin-bottom: 0;">
                            <label>Kategori Pasien</label>
                            <select id="kategori" required>
                                <option value="Umum">Pasien Umum</option>
                                <option value="BPJS">Pasien BPJS</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Nama Obat</label>
                        <div class="custom-select-wrapper" id="wrapper-nama-obat">
                            <input type="text" id="nama-obat" placeholder="Cari & klik nama obat..." autocomplete="off" required>
                            <div class="custom-select-list" id="list-nama-obat"></div>
                        </div>
                    </div>

                    <div class="summary-cards" style="grid-template-columns: 1fr 2fr; margin-bottom: 0;">
                        <div class="form-group" style="margin-bottom: 0;">
                            <label>Jumlah Keluar</label>
                            <input type="number" id="jumlah" required min="1" placeholder="Contoh: 2">
                        </div>
                        <div class="form-group" style="margin-bottom: 0;">
                            <label>Keterangan (Opsional)</label>
                            <input type="text" id="keterangan" placeholder="Nama Pasien / Dokter">
                        </div>
                    </div>
                    <br>
                    <button type="submit" class="btn" id="btn-submit">Catat Pengeluaran</button>
                </form>
            </div>

            <h2>Riwayat Hari Ini</h2>
            <div class="table-responsive">
                <table id="table-riwayat-keluar">
                    <thead>
                        <tr>
                            <th>Tanggal</th>
                            <th>Kategori</th>
                            <th>Nama Obat</th>
                            <th>Jumlah</th>
                            <th>Keterangan</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="5">Memuat riwayat...</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    
    <script src="js/sidebar.js"></script>
    <script src="js/api.js"></script>
    <script src="js/obat-keluar.js"></script>
</body>
</html>
