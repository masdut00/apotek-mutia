<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Obat Keluar - MutiaCare</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="layout-container"></div>
    
    <div class="app-container">
        <main class="main-content">
            <h1 class="page-title">Catat Obat Keluar 💊</h1>
            
            <div class="card" style="margin-bottom: 30px;">
                <form id="form-obat-keluar">
                    <div class="form-group">
                        <label>Tanggal</label>
                        <input type="date" id="tanggal" required>
                    </div>
                    <div class="form-group">
                        <label>Nama Obat</label>
                        <div class="custom-select-wrapper" id="wrapper-nama-obat">
                            <input type="text" id="nama-obat" placeholder="Cari & klik nama obat..." autocomplete="off" required>
                            <div class="custom-select-list" id="list-nama-obat">
                                </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Jumlah Keluar</label>
                        <input type="number" id="jumlah" required min="1" placeholder="Contoh: 2">
                    </div>
                    <div class="form-group">
                        <label>Keterangan (Opsional)</label>
                        <input type="text" id="keterangan" placeholder="Contoh: Resep Dr. Andi / Pasien Budi">
                    </div>
                    <button type="submit" class="btn" id="btn-submit">Catat Pengeluaran</button>
                </form>
            </div>

            <h2>Riwayat Obat Keluar</h2>
            <div class="table-responsive">
                <table id="table-riwayat-keluar">
                    <thead>
                        <tr>
                            <th>Tanggal</th>
                            <th>Nama Obat</th>
                            <th>Jumlah</th>
                            <th>Keterangan</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="4">Memuat riwayat...</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    
    <script src="js/sidebar.js"></script>
    <script src="js/api.js"></script>
    <script src="js/obat-keluar.js"></script>
</body>
</html>
