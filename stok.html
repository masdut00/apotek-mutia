<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Stok - MutiaCare</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="layout-container"></div>
    
    <div class="app-container">
        <main class="main-content">
            <h1 class="page-title">Input Stok Bulanan 📦</h1>
            <div class="card">
                <form id="form-stok">
                    <div class="form-group">
                        <label>Bulan & Tahun</label>
                        <input type="text" id="bulan" required placeholder="Contoh: Mar 2026">
                    </div>
                    
                    <div class="form-group">
                        <label>Nama Obat</label>
                        <div class="custom-select-wrapper" id="wrapper-nama-obat">
                            <input type="text" id="nama-obat" placeholder="Cari & klik nama obat..." autocomplete="off" required>
                            <div class="custom-select-list" id="list-nama-obat">
                                </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Stok Awal</label>
                        <input type="number" id="stok-awal" required min="0">
                    </div>
                    <div class="form-group">
                        <label>Stok Akhir</label>
                        <input type="number" id="stok-akhir" required min="0">
                    </div>
                    <button type="submit" class="btn" id="btn-submit">Simpan Stok</button>
                </form>
            </div>
        </main>
    </div>
    
    <script src="js/sidebar.js"></script>
    <script src="js/api.js"></script>
    <script src="js/stok.js"></script>
</body>
</html>
