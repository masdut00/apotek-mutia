<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Stok - MutiaCare</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="layout-container"></div>
    
    <div class="app-container">
        <main class="main-content">
            <h1 class="page-title">Input Stok Opname 📦</h1>
            <div class="card">
                <form id="form-stok">
                    <div class="summary-cards" style="grid-template-columns: 1fr 1fr 1.5fr; margin-bottom: 15px;">
                        <div class="form-group" style="margin-bottom: 0;">
                            <label>Bulan & Tahun</label>
                            <input type="text" id="bulan" required readonly style="background: #f0f0f0;">
                        </div>
                        <div class="form-group" style="margin-bottom: 0;">
                            <label>Lokasi Stok</label>
                            <select id="lokasi" required style="background: white;">
                                <option value="Bawah">Gudang Bawah</option>
                                <option value="Atas">Apotek Atas</option>
                            </select>
                        </div>
                        <div class="form-group" style="margin-bottom: 0;">
                            <label>Nama Barang / Obat</label>
                            <div class="custom-select-wrapper" id="wrapper-nama-obat">
                                <input type="text" id="nama-obat" placeholder="Cari obat..." autocomplete="off" required>
                                <div class="custom-select-list" id="list-nama-obat"></div>
                            </div>
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px;">
                        <div class="form-group">
                            <label>Jumlah Awal</label>
                            <input type="number" id="jumlah-awal" required min="0" value="0">
                        </div>
                        <div class="form-group">
                            <label>Obat Masuk</label>
                            <input type="number" id="obat-masuk" required min="0" value="0">
                        </div>
                        <div class="form-group">
                            <label>Obat Keluar</label>
                            <input type="number" id="obat-keluar" required min="0" value="0">
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background: #fffafb; padding: 15px; border-radius: 12px; border: 1px solid #ffe4e8; margin-bottom: 20px;">
                        <div class="form-group" style="margin-bottom: 0;">
                            <label style="color: #ff758c;">Jumlah Akhir (Otomatis)</label>
                            <input type="number" id="jumlah-akhir" readonly style="background: #fff0f3; font-weight: bold; color: #ff758c;">
                        </div>
                        <div class="form-group" style="margin-bottom: 0;">
                            <label>Harga Beli (Rp)</label>
                            <input type="number" id="harga-beli" required min="0" placeholder="5000">
                        </div>
                        <div class="form-group" style="grid-column: span 2; margin-bottom: 0;">
                            <label style="color: #27ae60;">Total Nilai (Rp) - Otomatis</label>
                            <input type="text" id="total-nilai" readonly style="background: #eafaf1; font-weight: bold; color: #27ae60;">
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div class="form-group">
                            <label>Expire Date</label>
                            <input type="date" id="expire-date" required>
                        </div>
                        <div class="form-group">
                            <label>No. Batch</label>
                            <input type="text" id="batch" required placeholder="Contoh: 240220">
                        </div>
                    </div>

                    <button type="submit" class="btn" id="btn-submit">Simpan Stok Opname</button>
                </form>
            </div>
        </main>
    </div>
    
    <script src="js/sidebar.js"></script>
    <script src="js/api.js"></script>
    <script src="js/stok.js"></script>
</body>
</html>
